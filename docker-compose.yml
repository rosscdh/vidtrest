version: '3.2'

services:
  web:
    build: .
    command: honcho start web
    environment:
      - DJANGO_ENV=production
      - PYTHONUNBUFFERED=1
      - DJANGO_LOCAL_SETTINGS=/config/production/local_settings.py
      - DATABASE_HOST=db
      - DATABASE_NAME=vidtrest
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - SENDGRID_USER=
      - SENDGRID_PASSWORD=
    volumes:
      - ./vidtrest:/vidtrest
      - ./templates:/templates
      - ./static:/static
      - ./media:/media
      - ./whoosh_index:/whoosh_index
      - ./config:/config
      - ./bower_components:/bower_components
      - ./ansible:/ansible
    ports:
      - "8000:8000"
    links:
      - db
      - redis
    depends_on:
      - db
      - redis
    stdin_open: true
    tty: true

  worker:
    build: .
    command: honcho start worker
    environment:
      - DJANGO_ENV=production
      - PYTHONUNBUFFERED=1
      - DJANGO_LOCAL_SETTINGS=/config/production/local_settings.py
      - DATABASE_HOST=db
      - DATABASE_NAME=vidtrest
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - SENDGRID_USER=
      - SENDGRID_PASSWORD=
    volumes:
      - ./vidtrest:/vidtrest
      - ./templates:/templates
      - ./static:/static
      - ./media:/media
      - ./whoosh_index:/whoosh_index
      - ./config:/config
      - ./bower_components:/bower_components
      - ./ansible:/ansible
    links:
      - db
      - redis
    depends_on:
      - db
      - redis
    stdin_open: true
    tty: true

  db:
    image: library/postgres:9.6.5-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vidtrest
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      #- ./config/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d # not necessary

  redis:
    image: library/redis:4.0-alpine
    ports:
      - "6379:6379"

  nginx:
    image: library/nginx:1.13.5-alpine
    ports:
      - "80:80"
    volumes:
      - ./config/production/nginx:/etc/nginx/conf.d
      - ./static:/static
      - ./media:/media
    links:
      - web
    # depends_on:
    #   - vidtrest

volumes:
  vidtrest:
    driver: local
  postgres-data:
    driver: local
  templates:
    driver: local
  static:
    driver: local
  media:
    driver: local
  whoosh_index:
    driver: local
  config:
    driver: local
  bower_components:
    driver: local
  ansible:
    driver: local
