version: '3.2'

services:
  vidtrest:
    build: .
    environment:
      - DJANGO_ENV=production
      - PYTHONUNBUFFERED=1
      - DJANGO_LOCAL_SETTINGS=/config/production/local_settings.py
      - DATABASE_HOST=db
      - DATABASE_NAME=postgres
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - SENDGRID_USER=''
      - SENDGRID_PASSWORD=''

    command: sh /config/startup.sh
    volumes:
      - ./vidtrest:/vidtrest:consistent
      - ./templates:/templates:consistent
      - ./static:/static:consistent
      - ./media:/media:consistent
      - ./whoosh_index:/whoosh_index:consistent
      - ./config:/config:consistent
      - ./bower_components:/bower_components:consistent
      - ./ansible:/ansible:consistent
    ports:
      - "8000:8000"
    links:
      - db
      - redis
    depends_on:
      - db
      - redis

  db:
    image: library/postgres:9.6.5-alpine
    environment:
      - POSTGRES_USER='postgres'
      - POSTGRES_PASSWORD='postgres'
      - POSTGRES_DB='postgres'
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data:consistent
      - ./config/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:consistent

  redis:
    image: library/redis:4.0-alpine
    ports:
      - "6379:6379"

  nginx:
    image: library/nginx:1.13.5-alpine
    ports:
      - "80:80"
    volumes:
      - ./config/production/nginx:/etc/nginx/conf.d:consistent
      - ./static:/static:consistent
      - ./media:/media:consistent
    links:
      - vidtrest

volumes:
  vidtrest:
    driver: local
  templates:
    driver: local
  static:
    driver: local
  media:
    driver: local
  whoosh_index:
    driver: local
  config:
    driver: local
  bower_components:
    driver: local
  ansible:
    driver: local
