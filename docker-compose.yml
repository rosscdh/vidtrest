version: '3.2'

services:
  vidtrest:
    build: .
    environment:
      - DJANGO_ENV=production
      - PYTHONUNBUFFERED=1
      - DJANGO_LOCAL_SETTINGS=/config/production/local_settings.py
    command: sh /config/startup.sh
    volumes:
      - ./vidtrest:/vidtrest
      - ./templates:/templates
      - ./static:/static
      - ./media:/media
      - ./whoosh_index:/whoosh_index
      - ./config:/config
      - ./bower_components:/bower_components
      - ./ansible:/ansible
    ports:
      - "8000:8000"
    links:
      - postgres
      - redis
    depends_on:
      - postgres
      - redis

  postgres:
    image: library/postgres:9.6.5-alpine
    environment:
      - POSTGRES_PASSWORD=twjRbhYbgn
      - POSTGRES_DB=vidtrest
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: library/redis:4.0-alpine
    ports:
      - "6379:6379"

  nginx:
    image: library/nginx:1.13.5-alpine
    ports:
      - "8080:80"
    links:
      - vidtrest
    volumes:
      - ./config/production/nginx:/etc/nginx/conf.d
      - ./static:/static
      - ./media:/media
    depends_on:
      - vidtrest

volumes:
  vidtrest:
    driver: local
  templates:
    driver: local
  static:
    driver: local
  media:
    driver: local
  whoosh_index:
    driver: local
  config:
    driver: local
  bower_components:
    driver: local
  ansible:
    driver: local
